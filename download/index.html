<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Descargar Lumi Studio</title>
<style>
  :root{--bg1:#f7e9e3;--bg2:#efd9d0;--ink:#2a2320;--muted:#8a7c74;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:var(--ink);
    background:radial-gradient(120% 100% at 50% 0%,var(--bg1),var(--bg2) 60%,#e7cfc6);
    display:flex;align-items:center;justify-content:center;padding:28px;min-height:100vh;-webkit-font-smoothing:antialiased;}
  .card{width:100%;max-width:420px;text-align:center;}
  .logo{width:96px;height:96px;margin:0 auto 22px;border-radius:22px;display:block;object-fit:cover;
    box-shadow:0 12px 30px rgba(214,120,110,.35);}
  h1{font-size:30px;margin:0 0 8px;letter-spacing:-.02em;font-weight:600;}
  .tag{font-size:17px;color:var(--muted);margin:0 0 34px;line-height:1.4;}
  .store{display:inline-flex;align-items:center;gap:12px;background:#111;color:#fff;text-decoration:none;
    padding:16px 26px;border-radius:15px;box-shadow:0 10px 24px rgba(0,0,0,.22);transition:transform .12s ease,opacity .12s ease;}
  .store:active{transform:scale(.97);opacity:.9;}
  .store .apple{width:24px;height:28px;fill:#fff;flex:0 0 auto;}
  .store small{display:block;font-size:11px;font-weight:500;opacity:.85;line-height:1;margin-bottom:3px;}
  .store b{font-size:19px;font-weight:600;line-height:1;}
  .foot{margin-top:20px;font-size:13px;color:var(--muted);}

  #guide{position:fixed;inset:0;background:linear-gradient(180deg,rgba(14,10,9,.72) 0%,rgba(14,10,9,.40) 52%,rgba(14,10,9,.28) 100%);color:#fff;z-index:99;display:none;text-shadow:0 1px 8px rgba(0,0,0,.55);}
  #guide.on{display:block;}
  .arrow{position:absolute;top:8px;right:10px;width:128px;height:128px;animation:bob 1.3s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translate(0,0);}50%{transform:translate(6px,-6px);}}
  .g-text{position:absolute;top:140px;right:22px;left:22px;text-align:right;}
  .g-text .big{font-size:23px;font-weight:600;line-height:1.4;}
  .g-text .dots{display:inline-block;background:#fff;color:#111;border-radius:9px;padding:1px 11px;font-weight:700;vertical-align:middle;}
  .g-text .sub{margin-top:14px;font-size:16px;color:#e7ddd6;line-height:1.45;}
  .g-foot{position:absolute;left:26px;right:26px;bottom:54px;text-align:center;font-size:14px;color:#d9cfc8;line-height:1.5;}
  .g-foot b{color:#fff;}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="./icon.png" alt="Lumi Studio" width="96" height="96">
    <h1>Lumi Studio</h1>
    <p class="tag">Maquillaje con IA. Tu editor de belleza.</p>
    <a id="store" class="store" href="#" rel="noopener">
      <svg class="apple" viewBox="0 0 384 512" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
      <span style="text-align:left"><small>Descárgala en el</small><b>App Store</b></span>
    </a>
    <p class="foot">Solo para iPhone.</p>
  </div>

  <div id="guide" aria-hidden="true">
    <svg class="arrow" viewBox="0 0 128 128" fill="none">
      <path d="M22 112 Q 34 44, 104 26" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-dasharray="1 11"/>
      <path d="M84 16 L 110 20 L 96 44 Z" fill="#fff"/>
    </svg>
    <div class="g-text">
      <div class="big">Toca <span class="dots">•••</span><br>y elige<br>"Abrir en el navegador"</div>
      <div class="sub">Así se abre Lumi en el App Store</div>
    </div>
    <div class="g-foot">¿No ves esa opción? Busca <b>"Lumi Studio"</b> en el App Store.</div>
  </div>

<script>
  var APP = "https://apps.apple.com/us/app/lumi-studio/id6758225277";
  var PT  = "128435016";
  var p = new URLSearchParams(location.search);
  var ct = (p.get("c") || p.get("ct") || "bio").replace(/[^a-zA-Z0-9_-]/g,"").slice(0,40) || "bio";
  var STORE = APP + "?pt=" + PT + "&ct=" + encodeURIComponent(ct);
  document.getElementById("store").setAttribute("href", STORE);
  var ua = navigator.userAgent || "";
  var inApp = /BytedanceWebview|musical_ly|Trill|TikTok|Instagram|FBAN|FBAV|FB_IAB|Line\/|Snapchat|Twitter|MicroMessenger/i.test(ua);
  var previewGuide = (p.get("guide") === "1");        // ?guide=1 -> 强制显示引导蒙层(桌面预览用)
  var noRedirect = (p.get("preview") === "1") || previewGuide; // ?preview=1 -> 只看页面不自动跳转
  var arr = document.querySelector(".arrow");                  // 箭头位置可用参数微调:?ax=右距 ?ay=上距 ?as=大小
  var ax = parseInt(p.get("ax")), ay = parseInt(p.get("ay")), as = parseInt(p.get("as"));
  if (!isNaN(ax)) arr.style.right = ax + "px";
  if (!isNaN(ay)) arr.style.top = ay + "px";
  if (!isNaN(as)) { arr.style.width = as + "px"; arr.style.height = as + "px"; }
  if (inApp || previewGuide) {
    document.getElementById("guide").classList.add("on");
  } else if (!noRedirect) {
    setTimeout(function(){ location.replace(STORE); }, 250);
  }
</script>
</body>
</html>
